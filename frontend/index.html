<!DOCTYPE html>
<html>
<head>
<title>Debt Portal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Debt Payment Portal</h1>

<div>

<h3>Check Balance</h3>

<input id="userId" placeholder="User ID">
<button onclick="getBalance()">Check</button>

</div>

<div id="balance"></div>

<div>

<h3>Submit Zelle Payment</h3>

<input id="debtId" placeholder="Debt ID">
<input id="amount" placeholder="Amount">
<input id="reference" placeholder="Zelle reference">

<button onclick="submitPayment()">Submit</button>

</div>

<script src="script.js"></script>

</body>
</html>
